<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipment Details - Smart Logistics</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Shipment Details</h1>
            <nav>
                <a th:href="@{/}" id="nav-dashboard">Dashboard</a>
                <a th:href="@{/shipments}" id="nav-shipments">Shipments</a>
            </nav>
        </header>

        <main>
            <div class="card-form">
                <form th:action="@{/shipments}" th:object="${shipment}" method="post" id="shipment-form">
                    <input type="hidden" th:field="*{id}">

                    <div class="form-group">
                        <label for="trackingCode" class="form-label">Tracking Code</label>
                        <input type="text" th:field="*{trackingCode}" class="form-input form-input-full" id="trackingCode" placeholder="e.g. SH-001" required>
                    </div>

                    <div class="form-group">
                        <label for="description" class="form-label">Description</label>
                        <input type="text" th:field="*{description}" class="form-input form-input-full" id="description" placeholder="e.g. Electronics delivery" required>
                    </div>

                    <div class="form-group">
                        <label for="status" class="form-label">Status</label>
                        <select th:field="*{status}" class="form-select form-input-full" id="status" required>
                            <option value="Pending">Pending</option>
                            <option value="In Transit">In Transit</option>
                            <option value="Delivered">Delivered</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="priority" class="form-label">Priority</label>
                        <select th:field="*{priority}" class="form-select form-input-full" id="priority" required>
                            <option value="Critical">Critical</option>
                            <option value="High">High</option>
                            <option value="Medium">Medium</option>
                            <option value="Low">Low</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="weight" class="form-label">Weight (kg)</label>
                        <input type="number" step="0.1" th:field="*{weight}" class="form-input form-input-full" id="weight" placeholder="e.g. 150.0" required>
                    </div>

                    <div class="form-actions">
                        <a th:href="@{/shipments}" class="btn btn-secondary" id="btn-cancel">Cancel</a>
                        <button type="submit" class="btn btn-primary" id="btn-save">Save Shipment</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
